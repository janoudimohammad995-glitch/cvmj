<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love You Wasan</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:black;
overflow:hidden;
margin:0;
}

.love{
position:absolute;
color:#ff9bb3;
font-weight:600;
white-space:nowrap;

text-shadow:
0 0 5px #ff7aa2,
0 0 10px #ff7aa2,
0 0 20px #ff7aa2,
0 0 40px #ff7aa2;

animation: float 6s linear infinite;
}

@keyframes float{
0%{
opacity:0;
transform: translateY(10px);
}
50%{
opacity:1;
}
100%{
opacity:0;
transform: translateY(-10px);
}
}

</style>

</head>

<body class="flex items-center justify-center min-h-screen">

<div id="heart" class="relative w-[90vw] h-[90vw] max-w-[500px] max-h-[500px]"></div>

<script>

const container = document.getElementById("heart");

const size = container.offsetWidth;

const scale = size / 40;
const offsetX = size / 2;
const offsetY = size / 2;

const fontSize = size / 25;

for(let t = 0; t < Math.PI * 2; t += 0.05){

let x = 16 * Math.pow(Math.sin(t),3);
let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);

x = x * scale + offsetX;
y = -y * scale + offsetY;

const text = document.createElement("div");

text.className = "love";
text.innerText = "Love you Wasan";

text.style.left = x + "px";
text.style.top = y + "px";
text.style.fontSize = fontSize + "px";

text.style.animationDelay = Math.random() * 5 + "s";

container.appendChild(text);

}

</script>

</body>
</html>
