<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love you Wasan</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:black;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
font-family:sans-serif;
}

#ui{
position:relative;
width:min(90vw,500px);
height:min(90vw,500px);
}

.love_word{
position:absolute;
color:#ff9bc2;
font-weight:600;
white-space:nowrap;

text-shadow:
0 0 5px #ff7aa2,
0 0 10px #ff7aa2,
0 0 20px #ff7aa2,
0 0 30px #ff7aa2;

letter-spacing:2px;
transform:translate(-50%,-50%) rotate(-30deg);
animation: move 6s ease-in-out infinite alternate;
}

@keyframes move{

0%{
transform:translate(-50%,-50%) rotate(-30deg) translateX(-8px);
}

100%{
transform:translate(-50%,-50%) rotate(-30deg) translateX(8px);
}

}

</style>

</head>

<body>

<div id="ui"></div>

<script>

function drawHeart(){

const ui = document.getElementById("ui");
ui.innerHTML="";

const size = ui.clientWidth;

const scale = size/40;
const centerX = size/2;
const centerY = size/2;

const fontSize = size/25;

for(let i=0;i<90;i++){

let t = i/90 * Math.PI*2;

let x = 16*Math.pow(Math.sin(t),3);
let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);

x = x*scale + centerX;
y = -y*scale + centerY;

const el = document.createElement("div");

el.className="love_word";
el.innerText="Love you Wasan";

el.style.left = x + "px";
el.style.top = y + "px";
el.style.fontSize = fontSize + "px";

el.style.animationDelay = (i * -0.25) + "s";

ui.appendChild(el);

}

}

drawHeart();

window.addEventListener("resize", drawHeart);

</script>

</body>
</html>
